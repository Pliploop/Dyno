defaults:
  - _self_

model_summary:
  _target_: lightning.pytorch.callbacks.RichModelSummary
  max_depth: 2

progress:
  _target_: lightning.pytorch.callbacks.progress.RichProgressBar
  refresh_rate: 1

model_checkpoint:
  _target_: lightning.pytorch.callbacks.ModelCheckpoint
  dirpath: ${paths.ckpt_dir}
  filename: "epoch={epoch}-val_loss={val/loss:.4f}"
  monitor: val/loss
  mode: min
  save_top_k: 3
  auto_insert_metric_name: false

mspf:
  _target_: dyno.callbacks.dyno.MSPFCallback
  n_samples: 4
  every_n_epochs: 1
  window: 30
  sigma: 10.0
  lam: 1.0e-3
  power: 1.0
  absolute: true   # false → normalised [0,1] time axis, true → frame-level
  n_points: 100    # output resolution when absolute=false

ssm:
  _target_: dyno.callbacks.dyno.SSMCallback
  n_samples: 4
  every_n_epochs: 1
