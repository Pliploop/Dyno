defaults:
  - aggregator: default
  - bottleneck: ae     # switch to "ae" for DynoAutoEncoder (no KL penalty)
  - predictor: default

_target_: dyno.models.dyno.dyno.LightningDyno

ckpt_path: null
freeze: false

# Central dimensions. Subconfigs interpolate these so changing encoder width,
# transformer widths, or bottleneck size only happens here.
embedding_dim: 512
aggregator_model_dim: 1024
predictor_model_dim: 768
latent_dim: 256

# Beta-VAE weight on the KL term — ignored (returns 0) with bottleneck: ae
beta: 1.0e-3

# Which frame to use as the predictor conditioning token
#   "first" → x[:, 0, :]     — required when output_mode=velocity
#   "mean"  → x.mean(dim=1)  — average-content anchor; valid with embeddings or centered_residuals
content_token: mean

# What the predictor outputs
#   "velocity"   — T-1 frame-difference vectors; integrated from first frame; requires content_token=first
#   "embeddings" — T full embedding predictions; supports z_tau-only no-anchor reconstruction
#   "centered_residuals" — T residual predictions against x - mean; requires content_token=mean
output_mode: centered_residuals

# Which tokens the predictor receives as conditioning. At least one must be true.
# With embeddings and condition_zc=false, the decoder reconstructs absolute
# embeddings from z_tau alone (the no-anchor ablation).
condition_z_tau: true
condition_zc: true

# Compatibility alias: when true, this overrides the knobs to z_tau-only
# conditioning (condition_z_tau=true, condition_zc=false).
temporal_only_conditioning: false

# Optional non-learnable normalization applied over the embedding dimension before
# Dyno encodes, conditions, and computes reconstruction loss. Uses aggregator.input_dim.
#   null / identity  - no normalization
#   layernorm        - per-sample LayerNorm with no affine parameters
#   dataset_stats    - one train-loader pass before fit; mean/std saved as buffers
input_norm: null
input_norm_eps: 1.0e-5

# Reconstruction loss for embedding trajectories: l1, l2/mse, or huber/smooth_l1.
recon_loss: l1
huber_delta: 0.1

optimizer:
  _target_: torch.optim.AdamW
  _partial_: true
  lr: 0.0001
  weight_decay: 0.0001
  betas: [0.9, 0.999]

scheduler:
  _target_: dyno.models.utils.schedulers.CosineDecayWithLinearWarmup
  _partial_: true
  warmup_steps: 0
  max_steps: ${trainer.max_steps}
  base_lr: 0.0001
  final_lr: 0.00001
