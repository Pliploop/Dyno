_target_: dyno.models.dyno.predictor.DynoVelocityPredictor
input_dim: ${..embedding_dim}
latent_dim: ${..latent_dim}
model_dim: ${..predictor_model_dim}
num_heads: 8
num_layers: 6
ffn_dim: 3072
dropout: 0.1
max_frames: 1024
rope_theta: 10000.0
# Conditioning mechanism — one of: adaLN_zero | film | cross_attention | prefix
conditioning_type: adaLN_zero
condition_z_tau: ${..condition_z_tau}
condition_zc: ${..condition_zc}
temporal_only_conditioning: ${..temporal_only_conditioning}
# Adds z_tau directly to position queries before the modulation blocks, giving
# the aggregator/bottleneck a gradient path from step 1 with adaLN_zero.
# Ignored when condition_z_tau=false.
direct_z_tau_conditioning: true
