# @package _global_

# Feature extraction entry-point config.
# Select encoder via +extract_features=<encoder> (see configs/extract_features/).
# Example:
#   python gdr/extract_dataset.py +extract_features=clap data.folder_path=/data/music
#   python gdr/extract_dataset.py +extract_features=mert data.folder_path=/data/music

defaults:
  - _self_
  - data: extract_features      # FolderAudioDataModule — override sr/chunk via extract_features/<encoder>
  - model: encoder/clap         # default encoder; override with model=encoder/<name>
  - paths: default
  - hydra: default
  - dora: default
  - sagemaker: extract_feature
  - extras: default
  - optional local: default
  - debug: null

task_name: "extract_feature"
seed: 42
device: cuda:0

save_dir: /opt/ml/processing/output
root_path: /opt/ml/processing/input

# Encoder calling convention — matches AudioEncoderBase interface
extract_method: extract_features
out_key: embedding_proj

# hop = step between audio chunks (in target-sr samples).
# Set to target_n_samples for non-overlapping extraction (the default).
# Overridden per-encoder in configs/extract_features/<encoder>.yaml
hop: null

limit_n: null
save: true
sagemaker_dir: ${sagemaker.processing_output.destination}
batch_size: 8
num_workers: 8
max_batch_chunks: 200
