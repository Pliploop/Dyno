# @package _global_

# specify here default configuration
# order of defaults determines the order in which configs override each other
defaults:
  - _self_
  - data: extract_features
  - trainer: default
  - model: extract_features
  - paths: default
  - hydra: default
  - dora: default
  - sagemaker: extract_feature
  - extras: default

  # optional local config for machine/user specific settings
  # it's optional since it doesn't need to exist and is excluded from version control
  - optional local: default

  # debugging config (enable through command line, e.g. `python extract_dataset.py debug=default)
  - debug: null

# task name, determines output directory path
task_name: "extract_feature"

# seed for random number generators in pytorch, numpy and python.random
seed: 42

# device for feature extraction
device: cuda:0

# extract-specific parameters (can be overridden in extract_features subconfigs)
save_dir: /opt/ml/processing/output
root_path: /opt/ml/processing/input
extract_method: get_audio_embedding_from_data
out_key: embedding_proj
hop: 48000
limit_n: null
save: true
sagemaker_dir: ${sagemaker.processing_output.destination}
batch_size: 8
num_workers: 8
max_batch_chunks: 200
