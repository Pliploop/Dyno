# Default data configuration (placeholder)
# This should be overridden by specific data configs
_target_: gdr.dataloading.dataloaders.TextAudioDataModule

# Single small dataset for testing
datasets:

  maxcaps:
    _target_: gdr.dataloading.datasets.TextAudioDataset
    get_annotations_function: "gdr.dataloading.dataloaders.get_maxcaps_annotations"
    task_kwargs:
      data_path: /data3/scratch/acw749/datasets/maxcaps/clap
      jsonl_path: /data3/scratch/acw749/datasets/maxcaps/final_caption30sec.jsonl
    split: null
    preextracted_features: true
    truncate_preextracted: 64

  musiccaps_val:
    _target_: gdr.dataloading.datasets.TextAudioDataset
    get_annotations_function: "gdr.dataloading.dataloaders.get_musiccaps_annotations"
    task_kwargs:
      data_path: /data3/scratch/acw749/datasets/musiccaps/musiccaps_10s
      csv_path: /data3/scratch/acw749/datasets/musiccaps/musiccaps-public.csv
    split: "val"
    root_dir: /data3/scratch/acw749/datasets/musiccaps/musiccaps_10s
    new_dir: /data3/scratch/acw749/datasets/musiccaps/clap/musiccaps_10s  # CHANGE THIS TO YOUR EXTRACTED FEATURES PATH
    preextracted_features: true
    truncate_preextracted: 64  # Small for testing

  song_describer_val:
    _target_: gdr.dataloading.datasets.TextAudioDataset
    get_annotations_function: "gdr.dataloading.dataloaders.get_song_describer_annotations"
    task_kwargs:
      data_path: /data3/scratch/acw749/datasets/songdescriber/data/audio
      csv_path: /data3/scratch/acw749/datasets/songdescriber/data/song_describer.csv
    split: "val"
    root_dir: /data3/scratch/acw749/datasets/songdescriber/data/audio
    new_dir: /data3/scratch/acw749/datasets/songdescriber/data/clap
    preextracted_features: true
    truncate_preextracted: 64


batch_size: 8
num_workers: 8
preextracted_features: true
truncate_preextracted: 64

