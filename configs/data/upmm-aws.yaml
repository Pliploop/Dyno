_target_: dyno.dataloading.dataloaders.TextAudioDataModule

# UPMM dataset configuration for AWS/SageMaker

batch_size: 64
num_workers: 8
preextracted_features: true
truncate_preextracted: 64
name: upmm-aws

datasets:

  upmm:
    _target_: dyno.dataloading.datasets.TextAudioDataset
    get_annotations_function: "dyno.dataloading.dataloaders.get_upmm_annotations"
    task_kwargs:
      data_path: ${paths.data_dir}/${data.name}/upmm
      csv_path: s3://maml-aimcdt/datasets/GDR-Training/upmm_captions.csv
    split: keep
    preextracted_features: ${data.preextracted_features}
    truncate_preextracted: ${data.truncate_preextracted}

  song_describer_val:
    _target_: dyno.dataloading.datasets.TextAudioDataset
    get_annotations_function: "dyno.dataloading.dataloaders.get_song_describer_annotations"
    task_kwargs:
      data_path: ${paths.data_dir}/${data.name}/song_describer
      csv_path: s3://maml-aimcdt/datasets/GDR-Training/song_describer.csv
    split: val
    root_dir: /import/research_c4dm/jpmg86/song-describer/data/audio
    new_dir: ${paths.data_dir}/${data.name}/song_describer
    preextracted_features: ${data.preextracted_features}
    truncate_preextracted: ${data.truncate_preextracted}

  musiccaps_val:
    _target_: dyno.dataloading.datasets.TextAudioDataset
    get_annotations_function: "dyno.dataloading.dataloaders.get_musiccaps_annotations"
    task_kwargs:
      data_path: ${paths.data_dir}/${data.name}/musiccaps
      csv_path: s3://maml-aimcdt/datasets/GDR-Training/musiccaps.csv
    split: val
    root_dir: /import/c4dm-datasets/musiccaps/musiccaps_10s
    new_dir: ${paths.data_dir}/${data.name}/musiccaps
    preextracted_features: ${data.preextracted_features}
    truncate_preextracted: ${data.truncate_preextracted}


