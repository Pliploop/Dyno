# @package _global_
# MERT extraction: m-a-p/MERT-v1-330M, 24 kHz, 10-second chunks → (N, T_frames, 1024)
# With pool: false, each 10-second chunk produces ~750 frames at 75 Hz.
# Saved as (N * ~750, 1024) per song.

defaults:
  - override /model: encoder/mert

data:
  target_sr: 24000
  target_n_samples: 240000   # 10 s at 24 kHz
