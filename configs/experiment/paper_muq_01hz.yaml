# @package _global_

# Full-dataset residual baseline for MuQ 0.1 Hz embeddings.
# Starts from the residual overfit setup, then scales capacity and restores
# regularization/scheduling for ~55k full tracks.


defaults:
  - override /data: dyno
  - override /model: dyno
  - override /model/bottleneck: default
  - override /callbacks: paper
  - override /logger: paper
  - override /trainer: paper


task_name: "train_residuals_muq_0p1hz"
tags: ["baseline", "residuals", "muq", "0.1hz"]

data:
  embedding_encoder: muq
  embedding_rate: 0.1hz
  train_csv: /gpfs/scratch/acw749/datasets/dyno/mtg-jamendo/muq/0.1hz/manifests/paper_artist_2000val_2000test_seed142/train.csv
  val_csv: /gpfs/scratch/acw749/datasets/dyno/mtg-jamendo/muq/0.1hz/manifests/paper_artist_2000val_2000test_seed142/val.csv
  test_csv: /gpfs/scratch/acw749/datasets/dyno/mtg-jamendo/muq/0.1hz/manifests/paper_artist_2000val_2000test_seed142/test.csv
  n_frames: 30
  batch_size: 512
  num_workers: 16
  random_crop: true

model:
  embedding_dim: 512
  aggregator_model_dim: 768
  predictor_model_dim: 768
  latent_dim: 32
  content_token: mean
  output_mode: centered_residuals
  condition_z_tau: true
  condition_zc: false
  temporal_only_conditioning: false
  input_norm: dataset_stats
  beta: 1e-3
  recon_loss: l1
  aggregator:
    num_heads: 12
    num_layers: 6
    ffn_dim: 3072
    dropout: 0.05
  predictor:
    num_heads: 12
    num_layers: 6
    ffn_dim: 3072
    dropout: 0.05
    conditioning_type: adaLN_zero
    condition_z_tau: ${..condition_z_tau}
    condition_zc: ${..condition_zc}
    temporal_only_conditioning: ${..temporal_only_conditioning}
    direct_z_tau_conditioning: true
  optimizer:
    lr: 0.0001
    weight_decay: 0.00001
  scheduler:
    warmup_steps: 2000
    max_steps: ${trainer.max_steps}
    base_lr: 0.0001
    final_lr: 0.00001

