_target_: dyno.dataloading.dataloaders.TextAudioDataModule

# UPMM dataset configuration for AWS/SageMaker

batch_size: 64
num_workers: 8
preextracted_features: true
truncate_preextracted: 64
name: upmm-aws

datasets:
  # training datasets
  upmm2:
    _target_: dyno.dataloading.datasets.TextAudioDataset
    get_annotations_function: "dyno.dataloading.dataloaders.get_upmm_annotations"
    task_kwargs:
      data_path: ${paths.data_dir}/${data.name}/upm2
      csv_path: s3://maml-aimcdt/datasets/GDR-Training/upmm2.csv
    split: keep
    preextracted_features: ${data.preextracted_features}
    truncate_preextracted: ${data.truncate_preextracted}
    processors: # augmentation processors
      - _target_: dyno.dataloading.datasets.ShuffleTagsProcessor
        probability: 0.5
        replace_caption_p: 0.5
        split: 
          - "train"
      - _target_: dyno.dataloading.datasets.RandomNSentencesProcessor
        probability: 0.5
        split: 
          - "train"
      - _target_: dyno.dataloading.datasets.ShuffleSentencesProcessor
        probability: 0.5
        split: 
          - "train"

  upmm:
    _target_: dyno.dataloading.datasets.TextAudioDataset
    get_annotations_function: "dyno.dataloading.dataloaders.get_upmm_annotations"
    task_kwargs:
      data_path: ${paths.data_dir}/${data.name}/upmm
      csv_path: s3://maml-aimcdt/datasets/GDR-Training/upmm_captions.csv
    split: keep
    filter_split: 
      - "val"
    preextracted_features: ${data.preextracted_features}
    truncate_preextracted: ${data.truncate_preextracted}

  maxcaps:
    _target_: dyno.dataloading.datasets.TextAudioDataset
    get_annotations_function: "dyno.dataloading.dataloaders.get_maxcaps_annotations"
    task_kwargs:
      data_path: ${paths.data_dir}/${data.name}/maxcaps
      csv_path: s3://maml-aimcdt/datasets/GDR-Training/maxcaps.csv
    split: keep
    preextracted_features: ${data.preextracted_features}
    truncate_preextracted: ${data.truncate_preextracted}
    processors:
      - _target_: dyno.dataloading.datasets.ShuffleTagsProcessor
        probability: 0.5
        replace_caption_p: 0.5
        split: 
          - "train"
      - _target_: dyno.dataloading.datasets.RandomNSentencesProcessor
        probability: 0.5
        split: 
          - "train"
      - _target_: dyno.dataloading.datasets.ShuffleSentencesProcessor
        probability: 0.5
        split: 
          - "train"

  commercial:
    _target_: dyno.dataloading.datasets.TextAudioDataset
    get_annotations_function: "dyno.dataloading.dataloaders.get_commercial_large_annotations"
    task_kwargs:
      data_path: ${paths.data_dir}/${data.name}/commercial-400k
      csv_path: s3://maml-aimcdt/datasets/GDR-Training/commercial.csv
    split: keep
    preextracted_features: ${data.preextracted_features}
    truncate_preextracted: ${data.truncate_preextracted}
    processors:
      - _target_: dyno.dataloading.datasets.ShuffleTagsProcessor
        probability: 0.5
        replace_caption_p: 0.5
        split: 
          - "train"
      - _target_: dyno.dataloading.datasets.RandomNSentencesProcessor
        probability: 0.5
        split: 
          - "train"
      - _target_: dyno.dataloading.datasets.ShuffleSentencesProcessor
        probability: 0.5
        split: 
          - "train"

    
  # validation datasets
  song_describer_val:
    _target_: dyno.dataloading.datasets.TextAudioDataset
    get_annotations_function: "dyno.dataloading.dataloaders.get_song_describer_annotations"
    task_kwargs:
      data_path: ${paths.data_dir}/${data.name}/song_describer
      csv_path: s3://maml-aimcdt/datasets/GDR-Training/song_describer.csv
    split: val
    root_dir: /import/research_c4dm/jpmg86/song-describer/data/audio
    new_dir: ${paths.data_dir}/${data.name}/song_describer
    preextracted_features: ${data.preextracted_features}
    truncate_preextracted: ${data.truncate_preextracted}

  musiccaps_val:
    _target_: dyno.dataloading.datasets.TextAudioDataset
    get_annotations_function: "dyno.dataloading.dataloaders.get_musiccaps_annotations"
    task_kwargs:
      data_path: ${paths.data_dir}/${data.name}/musiccaps
      csv_path: s3://maml-aimcdt/datasets/GDR-Training/musiccaps.csv
    split: val
    root_dir: /import/c4dm-datasets/musiccaps/musiccaps_10s
    new_dir: ${paths.data_dir}/${data.name}/musiccaps
    preextracted_features: ${data.preextracted_features}
    truncate_preextracted: ${data.truncate_preextracted}

  yt8m_val:
    _target_: dyno.dataloading.datasets.TextAudioDataset
    get_annotations_function: "dyno.dataloading.dataloaders.get_yt8m_annotations"
    task_kwargs:
      data_path: ${paths.data_dir}/${data.name}/yt8m
      csv_path: s3://maml-aimcdt/datasets/GDR-Training/yt8m.csv
    split: val
    root_dir: /import/c4dm-datasets/yt8m
    new_dir: ${paths.data_dir}/${data.name}/yt8m
    preextracted_features: ${data.preextracted_features}
    truncate_preextracted: ${data.truncate_preextracted}


