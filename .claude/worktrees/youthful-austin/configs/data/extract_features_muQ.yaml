
_target_: dyno.dataloading.dataloaders.TextAudioDataModule

# Data overrides - folder extraction (no specific task)
datasets:
  folder:
    _target_: dyno.dataloading.datasets.TextAudioDataset
    get_annotations_function: dyno.dataloading.dataloaders.get_folder_annotations
    task_kwargs:
      data_path: /opt/ml/processing/input
    split: train
    preextracted_features: false
    return_text: false
    target_sr: 24000
    target_n_samples: 120000 # 5 seconds
    hop: 24000
  
batch_size: 8
num_workers: 8
preextracted_features: false
truncate_preextracted: 64
return_text: false

    