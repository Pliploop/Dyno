# @package _global_

# Test configuration for refactor validation
# This is a minimal config to test that all components work together

defaults:
  - _self_
  # - trainer: default
  - paths: default
  - extras: default

# Basic settings
seed: 42
train: true
test: false
resume: false
ckpt_path: null

# Paths (override for test)
paths:
  root_dir: ${oc.env:PROJECT_ROOT}
  data_dir: ${paths.root_dir}/data
  ckpt_dir: ${paths.root_dir}/test_checkpoints
  output_dir: ${paths.root_dir}/test_outputs
  log_dir: ${paths.output_dir}/logs

# Minimal trainer for fast testing
trainer:
  _target_: lightning.pytorch.Trainer
  accelerator: gpu
  devices: 1
  # max_epochs: 5
  max_steps: 20000 
  log_every_n_steps: 1
  num_sanity_val_steps: 0
  enable_checkpointing: false
  enable_progress_bar: true
  enable_model_summary: true
  precision: 16-mixed

# Minimal callbacks
callbacks:
  model_summary:
    _target_: lightning.pytorch.callbacks.RichModelSummary
    max_depth: 1
  progress: # rich progress bar
    _target_: lightning.pytorch.callbacks.progress.RichProgressBar
    refresh_rate: 1
  generation:
    _target_: dyno.callbacks.generation.GenerationCallback
    enable_on_validation: true
    enable_on_test: true
    every_n_epochs: 1
    guidance_scale: 5.0
    num_inference_steps: 100
  teacher_retrieval:
    _target_: dyno.callbacks.retrieval.TeacherRetrieval
    thresholds: [1, 5, 10]
    enable_on_validation: true
    enable_on_test: true
    every_n_epochs: 1
  teacher_score:
    _target_: dyno.callbacks.retrieval.TeacherScore
    enable_on_validation: true
    enable_on_test: true
    every_n_epochs: 1
  gen_retrieval:
    _target_: dyno.callbacks.retrieval.GenRetrieval
    thresholds: [1, 5, 10]
    enable_on_validation: true
    enable_on_test: true
    every_n_epochs: 1
  gen_score:
    _target_: dyno.callbacks.retrieval.GenScore
    enable_on_validation: true
    enable_on_test: true
    every_n_epochs: 1

# No logger for test
logger:
  wandb:
    _target_: lightning.pytorch.loggers.wandb.WandbLogger
    # name: "" # name of the run (normally generated by wandb)
    save_dir: "${paths.output_dir}"
    offline: false
    # id: ${dora:xp.sig}  # pass correct id to resume experiment!
    project: "GDR2"
    log_model: False # upload lightning ckpts
    save_code: true
    prefix: "" # a string to put at the beginning of metric keys
    entity: "jul-guinot" # set to name of your wandb team
    # group: "${hydra:runtime.choices.data}-${hydra:runtime.choices.model/audio_encoder}-${hydra:runtime.choices.model/text_encoder}"
    tags: []
    job_type: ""

# Minimal data config
data:
  _target_: dyno.dataloading.dataloaders.TextAudioDataModule
  
  # Single small dataset for testing
  datasets:
    musiccaps:
      _target_: dyno.dataloading.datasets.TextAudioDataset
      get_annotations_function: "dyno.dataloading.dataloaders.get_musiccaps_annotations"
      task_kwargs:
        data_path: /data3/scratch/acw749/datasets/musiccaps/musiccaps_10s
        csv_path: /data3/scratch/acw749/datasets/musiccaps/musiccaps-public.csv
      split: "train"
      root_dir: /data3/scratch/acw749/datasets/musiccaps/musiccaps_10s
      new_dir: /data3/scratch/acw749/datasets/musiccaps/clap/musiccaps_10s  # CHANGE THIS TO YOUR EXTRACTED FEATURES PATH
      target_n_samples: 96000
      target_sr: 48000
      return_audio: true
      return_text: true
      preextracted_features: true
      truncate_preextracted: 32 # Small for testing
    musiccaps_val:
      _target_: dyno.dataloading.datasets.TextAudioDataset
      get_annotations_function: "dyno.dataloading.dataloaders.get_musiccaps_annotations"
      task_kwargs:
        data_path: /data3/scratch/acw749/datasets/musiccaps/musiccaps_10s
        csv_path: /data3/scratch/acw749/datasets/musiccaps/musiccaps-public.csv
      split: "val"
      root_dir: /data3/scratch/acw749/datasets/musiccaps/musiccaps_10s
      new_dir: /data3/scratch/acw749/datasets/musiccaps/clap/musiccaps_10s  # CHANGE THIS TO YOUR EXTRACTED FEATURES PATH
      target_n_samples: 96000
      target_sr: 48000
      return_audio: true
      return_text: true
      preextracted_features: true
      truncate_preextracted: 32  # Small for testing
  
  batch_size: 32  # Small batch
  num_workers: 8  # No multiprocessing for debugging
  preextracted_features: true
  truncate_preextracted: 32

# Minimal model config - using tiny UNet
model:
  _target_: dyno.models.ldm.diffusion.LightningGDR
  
  # Audio encoder configuration
  audio_encoder:
    _target_: dyno.models.ldm.text_encoders.CLAPAudioEncoder
    clap_kws:
      enable_fusion: false
      amodel: HTSAT-base
      device: cpu
    clap_ckpt: /opt/ml/checkpoints/CLAP/music_audioset_epoch_15_esc_90.14.pt
    ckpt_path: null
    freeze: true
  
  # Text encoder configuration (using CLAP text encoder)
  text_encoder:
    _target_: dyno.models.ldm.text_encoders.CLAPTextEncoder
    clap_kws:
      enable_fusion: false
      amodel: HTSAT-base
      device: cpu
    clap_ckpt: /opt/ml/checkpoints/CLAP/music_audioset_epoch_15_esc_90.14.pt
    ckpt_path: null
    freeze: true
  
  # Diffusion scheduler configuration
  noise_scheduler:
    _target_: diffusers.DDPMScheduler.from_pretrained
    pretrained_model_name_or_path: cvssp/audioldm2
    subfolder: scheduler  # AudioLDM2 stores scheduler config in scheduler/ subfolder
    prediction_type: epsilon
  
  # UNet backbone configuration
  # backbone:
  #   _target_: dyno.models.ldm.unet.UNet
  #   attention_features: 768
  #   embedding_features: 768
  #   name: tiny
  #   dim: 1
  #   in_channels: 512
  #   out_channels: 512
  #   channels: [768, 768]  # Minimal channels
  #   factors: [1, 1]
  #   items: [2, 2]  # Minimal layers
  #   attentions: [0, 1]
  #   cross_attentions: [0, 1]
  #   attention_heads: 8
  #   use_classifier_free_guidance: true
  #   embedding_max_length: 77
  #   resnet_groups: 1
  backbone:
    _target_: dyno.models.ldm.transformer.TransformerBackbone
    in_channels: 512
    out_channels: 512
    sample_size: 64  # Sequence length
    num_layers: 8  # Number of dual stream transformer layers
    num_single_layers: 6  # Number of single stream transformer layers
    inner_dim: 1024  # Inner dimension for the transformer
    num_attention_heads: 8  # Number of attention heads
    cond_dim: 768  # Embedding dimension for joint text-audio attention
    timestep_guidance_channels: 256  # Channels for timestep/guidance embedding
    mlp_ratio: 3.0  # MLP ratio for feedforward layers
    axes_dims_rope: [128]  # Dimensions for RoPE (for 1D: single dimension)
    rope_theta: 2000  # Theta parameter for RoPE
    eps: 1e-6  # Epsilon for normalization
    use_classifier_free_guidance: true
    embedding_max_length: 77
  
  # Model checkpoint and freezing
  ckpt_path: null
  freeze: false
  
  # Classifier-free guidance strength
  cfg: 0.1
  
  # Additional parameters passed via kwargs
  preextracted_latents: true
  retrieval_every_n_epochs: 1000  # Don't run during test
  
  # Optimizer configuration (will be instantiated in configure_optimizers with model parameters)
  # Using _partial_ to prevent Hydra from instantiating it during model creation
  optimizer:
    _target_: torch.optim.AdamW
    _partial_: true
    lr: 0.0001
    weight_decay: 0.0001
    betas: [0.9, 0.999]
    # Note: 'params' will be added automatically in configure_optimizers()
  
  # Learning rate scheduler configuration (will be instantiated in configure_optimizers with optimizer)
  # Using _partial_ to create a partial function instead of instantiating during model creation
  scheduler:
    _target_: dyno.models.utils.schedulers.CosineDecayWithLinearWarmup
    _partial_: true
    warmup_steps: 1000
    max_steps: ${trainer.max_steps}
    base_lr: 0.0001
    final_lr: 0.00001
    # Note: 'optimizer' will be added automatically in configure_optimizers()

# Extras
extras:
  ignore_warnings: true
  enforce_tags: false
  print_config: true

# Tags
tags: ["test", "refactor_validation"]

# Task name
task_name: "test_refactor"

# Optimized metric
optimized_metric: null

