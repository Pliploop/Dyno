# @package _global_

# specify here default configuration
defaults:
  - _self_
  - data: maxcaps_test
  - paths: default
  - hydra: default
  - dora: default

  # optional local config for machine/user specific settings
  - optional local: default

  # debugging config (enable through command line, e.g. `python inference_edit.py debug=default)
  - debug: null

# task name, determines output directory path
task_name: "inference_edit"

# seed for random number generators in pytorch, numpy and python.random
seed: 42

# device for inference
device: cuda:0

# Model will be overridden from source config via _fetch_config and _yaml_overrides
model: null

# Config fetching and override options
_fetch_config: null  # Set to wandb://entity/project/run_id or local yaml path
_yaml_overrides: null  # List of keys to override from fetched config (e.g., ["model"])

# Engine override options (optional - will override engines from model config)
# These can be set as config dicts or via command line using Hydra's config composition
# Examples:
#   _guidance_engine:
#     _target_: gdr.models.ldm.engines.CFGGuidanceEngine
#   _edit_engine:
#     _target_: gdr.models.ldm.engines.DDIMInversionEditEngine
# Or via command line: _guidance_engine=inference/engines/cfg_guidance
_guidance_engine: null  # Override guidance engine config dict
_edit_engine: null  # Override edit engine config dict (e.g., ddim_inversion or ddp_steer)

# Inference parameters
ckpt_path: null  # Path to checkpoint (required)
positive_prompt: null  # Positive prompt for editing/generation (required)
negative_prompt: null  # Optional negative prompt
audio_path: null  # Optional path to input audio file (if None, will generate from prompt)
original_prompt: ""  # Original prompt for inversion (if editing existing audio)
guidance_scale: 3.0
invert_steps: 20  # Number of inversion steps (for editing)
inference_steps: 50
top_k: 10  # Number of top results to return
target_sr: 48000
target_n_samples: 96000
preextracted_features: true  # Whether dataset features are pre-extracted
verbose: false  # Show progress bars

