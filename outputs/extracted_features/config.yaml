  fast_dev_run: false
  num_sanity_val_steps: 0
  deterministic: null
  benchmark: null
  sync_batchnorm: false
model:
  audio_encoder:
    _target_: gdr.models.ldm.text_encoders.CLAPAudioEncoder
    clap_kws:
      enable_fusion: false
      amodel: HTSAT-base
      device: cpu
    clap_ckpt: pretrained/music_audioset_epoch_15_esc_90.14.pt
    ckpt_path: null
    freeze: true
  text_encoder:
    _target_: gdr.models.ldm.text_encoders.CLAPTextEncoder
