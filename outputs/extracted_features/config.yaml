recompute_index: false
data:
  _target_: gdr.dataloading.dataloaders.TextAudioDataModule
  datasets: {}
  batch_size: 2
  num_workers: 2
trainer:
  _target_: lightning.pytorch.trainer.Trainer
  accelerator: auto
  strategy: auto
  devices: auto
  num_nodes: 1
  precision: null
  inference_mode: true
  use_distributed_sampler: true
  logger: null
